version: '3.8'
name: plantcare-website # 显式项目名，防止与主项目 plantsync 冲突

services:
  # 官网后端 API 服务
  website-app:
    build: .
    container_name: plantcare-website-backend
    ports:
      # 主项目使用了 9527，这里我们使用 3001
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      # 连接到主项目的数据库容器 (plantsync-db)
      - DB_HOST=plantsync-db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=rhs_data
    restart: always
    # 加入主项目的网络，以便能解析 plantsync-db 容器名
    networks:
      - plantsync_default

# 声明主项目已经创建好的外部网络
networks:
  plantsync_default:
    external: true
