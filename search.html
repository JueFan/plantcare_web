<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- Google tag (gtag.js) --> 
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNND3B63V8"></script> 
    <script> 
      window.dataLayer = window.dataLayer || []; 
      function gtag(){dataLayer.push(arguments);} 
      gtag('js', new Date()); 
    
      gtag('config', 'G-RNND3B63V8'); 
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlantCare - Search</title>
    
    <!-- Meta Tags for SEO -->
    <meta name="description" content="PlantCare is an AI-powered plant identifier and care management app. Instantly identify plants, get disease diagnosis, and dynamic care tasks.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        plant: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        dark: '#0f172a'
                    },
                    boxShadow: {
                        'soft': '0 20px 40px -15px rgba(0,0,0,0.05)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            color: #0f172a;
            overflow-x: hidden;
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* 隐藏滚动条但保留滚动功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 antialiased selection:bg-plant-200 selection:text-plant-900 min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-nav transition-all duration-300 shadow-sm py-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="window.location.href='./index.html'">
                    <div class="w-10 h-10 bg-plant-600 rounded-xl flex items-center justify-center shadow-lg shadow-plant-500/30">
                        <i class="fa-solid fa-leaf text-white text-xl"></i>
                    </div>
                    <span class="font-bold text-2xl tracking-tight text-dark">PlantCare</span>
                </div>
                
                <!-- Desktop Menu & Search -->
                <div class="hidden md:flex items-center flex-1 justify-between px-8">
                    <div class="flex space-x-8">
                        <a href="./index.html#features" class="text-slate-600 hover:text-plant-600 font-medium transition-colors">Features</a>
                        <a href="./index.html#stories" class="text-slate-600 hover:text-plant-600 font-medium transition-colors">User Stories</a>
                        <a href="./index.html#faq" class="text-slate-600 hover:text-plant-600 font-medium transition-colors">FAQ</a>
                    </div>
                    
                    <!-- Top Search Bar -->
                    <div class="relative w-72 group">
                        <button id="searchBtn" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-plant-600 transition-colors z-10 p-1">
                            <i data-lucide="search" class="w-4 h-4"></i>
                        </button>
                        <input type="text" id="searchInput" 
                            class="w-full bg-white border border-slate-200 focus:border-plant-500 focus:ring-2 focus:ring-plant-500/20 rounded-full py-2 pl-10 pr-10 text-sm transition-all outline-none placeholder:text-slate-400"
                            placeholder="Search Plants" autocomplete="off">
                        <!-- 清除按钮 -->
                        <button id="clearBtn" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hidden hover:text-slate-600 z-10 p-1">
                            <i data-lucide="x-circle" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                
                <!-- CTA Button -->
                <div class="hidden md:flex items-center">
                    <a href="./index.html#download" class="bg-dark hover:bg-slate-800 text-white px-6 py-2.5 rounded-full font-medium transition-all transform hover:scale-105 shadow-md">
                        Download App
                    </a>
                </div>
                
                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center">
                    <button class="text-slate-600 hover:text-dark focus:outline-none p-2">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Quick Filters (横向滚动) -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-3">
            <div class="overflow-x-auto hide-scrollbar flex gap-2 whitespace-nowrap">
                <button class="filter-btn active px-4 py-1.5 rounded-full text-xs font-medium border border-plant-600 bg-plant-50 text-plant-700 transition-colors" data-filter="all">全部推荐</button>
                <button class="filter-btn px-4 py-1.5 rounded-full text-xs font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-colors" data-filter="type" data-value="Shrubs">灌木</button>
                <button class="filter-btn px-4 py-1.5 rounded-full text-xs font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-colors" data-filter="type" data-value="Trees">乔木</button>
                <button class="filter-btn px-4 py-1.5 rounded-full text-xs font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-colors" data-filter="sunlight" data-value="Full sun">全日照</button>
                <button class="filter-btn px-4 py-1.5 rounded-full text-xs font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-colors" data-filter="sunlight" data-value="Partial shade">半阴</button>
                <button class="filter-btn px-4 py-1.5 rounded-full text-xs font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-colors" data-filter="low_maintenance" data-value="1">低维护</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 p-4 relative max-w-7xl mx-auto w-full pt-36">
        
        <!-- Search Home State (History & Hot) - 初始状态展示 -->
        <div id="searchHomeState" class="space-y-6 block">
            <!-- 历史搜索 -->
            <div>
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold text-slate-800">历史搜索</h3>
                    <button id="clearHistoryBtn" class="text-xs text-slate-400 hover:text-slate-600 flex items-center gap-1">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> 清空
                    </button>
                </div>
                <div id="historyContainer" class="flex flex-wrap gap-2">
                    <!-- 历史记录将通过 JS 渲染 -->
                </div>
            </div>

            <!-- 热门搜索 -->
            <div>
                <h3 class="text-sm font-semibold text-slate-800 mb-3 flex items-center gap-1">
                    <i data-lucide="flame" class="w-4 h-4 text-orange-500"></i> 热门植物
                </h3>
                <div id="hotSearchContainer" class="flex flex-wrap gap-2">
                    <span class="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-md cursor-pointer hover:bg-slate-200 transition-colors hot-tag">玫瑰</span>
                    <span class="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-md cursor-pointer hover:bg-slate-200 transition-colors hot-tag">绣球</span>
                    <span class="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-md cursor-pointer hover:bg-slate-200 transition-colors hot-tag">龟背竹</span>
                    <span class="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-md cursor-pointer hover:bg-slate-200 transition-colors hot-tag">发财树</span>
                </div>
            </div>
        </div>

        <!-- Search Results State (Grid) - 搜索后展示 -->
        <div id="searchResultsState" class="hidden">
            <!-- 状态提示 -->
            <div class="flex justify-between items-center mb-4">
                <span id="resultCount" class="text-xs text-slate-500">找到 0 个结果</span>
                <div class="flex items-center gap-1 text-xs text-slate-500 cursor-pointer">
                    综合排序 <i data-lucide="chevron-down" class="w-3 h-3"></i>
                </div>
            </div>

            <!-- Loading Skeleton -->
            <div id="loadingSkeleton" class="hidden grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
                <!-- 骨架屏通过 JS 注入 -->
            </div>

            <!-- Results Grid (瀑布流双列) -->
            <div id="resultsGrid" class="grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
                <!-- 植物卡片将通过 JS 渲染 -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden flex-col items-center justify-center py-12 text-center">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4 text-slate-400">
                    <i data-lucide="leaf" class="w-8 h-8"></i>
                </div>
                <h3 class="text-slate-800 font-medium mb-1">未找到相关植物</h3>
                <p class="text-xs text-slate-500 max-w-[200px]">尝试更换关键词，或者放宽筛选条件看看</p>
            </div>
        </div>
    </main>

    <script src="./config.js"></script>
    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 状态管理
        const state = {
            query: '',
            filters: {
                type: '',
                sunlight: '',
                low_maintenance: ''
            },
            history: JSON.parse(localStorage.getItem('plantSyncHistory') || '[]')
        };

        // DOM 元素
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const searchHomeState = document.getElementById('searchHomeState');
        const searchResultsState = document.getElementById('searchResultsState');
        const resultsGrid = document.getElementById('resultsGrid');
        const resultCount = document.getElementById('resultCount');
        const loadingSkeleton = document.getElementById('loadingSkeleton');
        const emptyState = document.getElementById('emptyState');
        const historyContainer = document.getElementById('historyContainer');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const hotTags = document.querySelectorAll('.hot-tag');

        // ================= 历史记录逻辑 =================
        
        function renderHistory() {
            if (state.history.length === 0) {
                historyContainer.innerHTML = '<span class="text-xs text-slate-400">暂无搜索记录</span>';
                return;
            }
            historyContainer.innerHTML = state.history.map(item => `
                <span class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 text-xs rounded-md cursor-pointer hover:border-plant-600 hover:text-plant-600 transition-colors history-tag">
                    ${item}
                </span>
            `).join('');

            // 绑定点击事件
            document.querySelectorAll('.history-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    searchInput.value = tag.textContent.trim();
                    handleSearch(searchInput.value);
                });
            });
        }

        function addHistory(keyword) {
            if (!keyword) return;
            // 移除重复项并放到最前
            state.history = state.history.filter(item => item !== keyword);
            state.history.unshift(keyword);
            // 最多保留 10 条
            if (state.history.length > 10) state.history.pop();
            localStorage.setItem('plantSyncHistory', JSON.stringify(state.history));
            renderHistory();
        }

        clearHistoryBtn.addEventListener('click', () => {
            state.history = [];
            localStorage.setItem('plantSyncHistory', JSON.stringify([]));
            renderHistory();
        });

        // 绑定热门搜索点击
        hotTags.forEach(tag => {
            tag.addEventListener('click', () => {
                searchInput.value = tag.textContent.trim();
                handleSearch(searchInput.value);
            });
        });

        // ================= 搜索与筛选逻辑 =================

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 处理搜索框输入 (仅控制清除按钮的显示/隐藏，不自动搜索)
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
                resetToHome();
            }
        });

        // 监听回车键触发搜索并保存历史记录
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = searchInput.value.trim();
                if (val) {
                    addHistory(val);
                    handleSearch(val);
                }
                searchInput.blur(); // 隐藏键盘
            }
        });

        // 监听搜索按钮点击触发搜索
        searchBtn.addEventListener('click', () => {
            const val = searchInput.value.trim();
            if (val) {
                addHistory(val);
                handleSearch(val);
            }
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            resetToHome();
        });

        function resetToHome() {
            state.query = '';
            searchHomeState.classList.remove('hidden');
            searchHomeState.classList.add('block');
            searchResultsState.classList.add('hidden');
            // 重置筛选
            filterBtns.forEach(b => {
                b.classList.remove('border-plant-600', 'bg-plant-50', 'text-plant-700');
                b.classList.add('border-slate-200', 'bg-white', 'text-slate-600');
            });
            if(filterBtns.length > 0) {
                filterBtns[0].classList.remove('border-slate-200', 'bg-white', 'text-slate-600');
                filterBtns[0].classList.add('border-plant-600', 'bg-plant-50', 'text-plant-700');
            }
            state.filters = { type: '', sunlight: '', low_maintenance: '' };
        }

        // 处理快捷筛选点击
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // UI 切换
                filterBtns.forEach(b => {
                    b.classList.remove('border-plant-600', 'bg-plant-50', 'text-plant-700');
                    b.classList.add('border-slate-200', 'bg-white', 'text-slate-600');
                });
                btn.classList.remove('border-slate-200', 'bg-white', 'text-slate-600');
                btn.classList.add('border-plant-600', 'bg-plant-50', 'text-plant-700');

                // 更新状态
                const filterKey = btn.getAttribute('data-filter');
                const filterVal = btn.getAttribute('data-value');
                
                state.filters = { type: '', sunlight: '', low_maintenance: '' }; // 简单起见，这里做单选互斥
                if (filterKey !== 'all') {
                    state.filters[filterKey] = filterVal;
                }

                // 触发搜索
                handleSearch(searchInput.value.trim());
            });
        });

        // ================= API 请求与渲染 =================

        async function handleSearch(keyword) {
            state.query = keyword;
            
            // UI 切换到结果页
            searchHomeState.classList.remove('block');
            searchHomeState.classList.add('hidden');
            searchResultsState.classList.remove('hidden');
            
            // 显示 Loading
            resultsGrid.innerHTML = '';
            emptyState.classList.add('hidden');
            renderSkeleton();

            try {
                // 构建查询参数
                const params = new URLSearchParams();
                if (state.query) params.append('q', state.query);
                if (state.filters.type) params.append('plant_type', state.filters.type);
                if (state.filters.sunlight) params.append('sunlight', state.filters.sunlight);
                if (state.filters.low_maintenance) params.append('low_maintenance', state.filters.low_maintenance);
                
                // API 调用
                const response = await fetch(`${CONFIG.API_BASE_URL}/search?${params.toString()}`);
                const data = await response.json();

                loadingSkeleton.classList.add('hidden');

                if (data.success) {
                    const plants = data.data;
                    resultCount.textContent = `找到 ${plants.length} 个结果`;

                    if (plants.length === 0) {
                        emptyState.classList.remove('hidden');
                        emptyState.classList.add('flex');
                    } else {
                        renderResults(plants);
                    }
                }
            } catch (error) {
                console.error('Search failed:', error);
                loadingSkeleton.classList.add('hidden');
                resultCount.textContent = '搜索出错，请重试';
            }
        }

        function renderSkeleton() {
            loadingSkeleton.classList.remove('hidden');
            loadingSkeleton.innerHTML = Array(10).fill(0).map(() => `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100 animate-pulse">
                    <div class="w-full aspect-[4/5] bg-slate-200"></div>
                    <div class="p-3 space-y-2">
                        <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                        <div class="h-3 bg-slate-200 rounded w-1/2"></div>
                        <div class="flex gap-1 pt-2">
                            <div class="h-4 w-12 bg-slate-200 rounded"></div>
                            <div class="h-4 w-12 bg-slate-200 rounded"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderResults(plants) {
            resultsGrid.innerHTML = plants.map(plant => {
                // 处理图片显示
                let imgUrl = plant.image;
                if (!imgUrl || imgUrl === 'NULL' || imgUrl === '') {
                    imgUrl = 'https://via.placeholder.com/300x400/e2e8f0/94a3b8?text=No+Image';
                }

                // 核心标签逻辑
                const tags = [];
                if (plant.sunlight && plant.sunlight !== 'No preference') {
                    const sunMap = { 'Full sun': '☀️ 全日照', 'Partial shade': '⛅ 半阴', 'Full shade': '☁️ 全阴' };
                    tags.push(`<span class="px-1.5 py-0.5 bg-amber-50 text-orange-600 rounded text-[10px] whitespace-nowrap">${sunMap[plant.sunlight] || plant.sunlight}</span>`);
                }
                if (plant.hardiness_level && plant.hardiness_level !== 'No preference') {
                    const coldMatch = plant.hardiness_level.match(/(H[1-7][A-C]?)/);
                    const coldText = coldMatch ? coldMatch[0] : '耐寒';
                    tags.push(`<span class="px-1.5 py-0.5 bg-blue-50 text-blue-600 rounded text-[10px] whitespace-nowrap">❄️ ${coldText}</span>`);
                }
                if (plant.low_maintenance) {
                    tags.push(`<span class="px-1.5 py-0.5 bg-emerald-50 text-emerald-600 rounded text-[10px] whitespace-nowrap">🛡️ 低维护</span>`);
                }

                // 名称回退逻辑
                const title = plant.common_name || plant.botanical_name || '未知植物';
                const subTitle = plant.common_name ? plant.botanical_name : plant.family;

                return `
                    <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer flex flex-col group" onclick="window.location.href='./plant.html?id=${plant.id}'">
                        <div class="relative w-full aspect-[4/5] bg-slate-100 overflow-hidden">
                            <img src="${imgUrl}" alt="${title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" loading="lazy" onerror="this.src='https://via.placeholder.com/300x400/e2e8f0/94a3b8?text=Image+Error'">
                            <!-- 收藏按钮 -->
                            <button class="absolute top-2 right-2 p-1.5 bg-black/20 hover:bg-black/40 rounded-full backdrop-blur-sm transition-colors">
                                <i data-lucide="heart" class="w-4 h-4 text-white"></i>
                            </button>
                        </div>
                        <div class="p-3 flex-1 flex flex-col">
                            <h3 class="text-sm font-semibold text-slate-800 line-clamp-1" title="${title}">${title}</h3>
                            <p class="text-[11px] text-slate-500 line-clamp-1 mb-2 italic" title="${subTitle}">${subTitle || ''}</p>
                            
                            <div class="mt-auto flex flex-wrap gap-1">
                                ${tags.join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 重新初始化动态生成的 Icon
            lucide.createIcons();
        }

        // 初始化
        renderHistory();

        // 检查 URL 中是否有 q 参数，如果有则自动触发搜索
        const urlParams = new URLSearchParams(window.location.search);
        const initialQuery = urlParams.get('q');
        if (initialQuery) {
            searchInput.value = initialQuery;
            clearBtn.classList.remove('hidden');
            handleSearch(initialQuery);
        }

    </script>
</body>
</html>
